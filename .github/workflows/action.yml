name: HaoFlow Backend 

on:
  push:
    branches: main 

jobs:
  test: 
    - name: Test 
      uses: actions/checkout@v6 
    - name: Set up node 
      uses: actions/setup-node@v6 
      with: 
        node-version: 24 
    - name: Install 
      run: npm ci 
    - name: Compile 
      run: npm run build 
    